<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ATG Audit Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#F5F7FA;height:100vh;overflow:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:10px}
select,input,textarea,button{font-family:'DM Sans',sans-serif}
textarea{resize:vertical}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:222px;background:#0F1C3F;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sidebar-logo{padding:18px 16px 12px;border-bottom:1px solid rgba(255,255,255,0.08)}
.sidebar-logo h1{color:#F0C040;font-size:14px;font-weight:800}
.sidebar-clients{padding:10px 10px 6px;border-bottom:1px solid rgba(255,255,255,0.08)}
.slbl{color:rgba(255,255,255,0.3);font-size:10px;font-weight:700;letter-spacing:0.8px;margin-bottom:5px;padding:0 4px}
.client-btn{display:flex;align-items:center;gap:7px;width:100%;padding:6px 9px;border-radius:7px;border:none;cursor:pointer;background:transparent;color:rgba(255,255,255,0.55);font-size:12px;font-weight:600;text-align:left;margin-bottom:1px;transition:all .15s}
.client-btn.active{background:rgba(240,192,64,0.18);color:#F0C040}
.cav{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;flex-shrink:0}
.add-c-btn{display:flex;align-items:center;gap:5px;width:100%;padding:5px 9px;border-radius:7px;border:1px dashed rgba(255,255,255,0.2);cursor:pointer;background:transparent;color:rgba(255,255,255,0.4);font-size:11px;font-weight:600;margin-top:4px}
.nav-tabs{flex:1;padding:8px}
.nav-btn{display:flex;align-items:center;gap:8px;width:100%;padding:8px 11px;border-radius:8px;border:none;cursor:pointer;background:transparent;color:rgba(255,255,255,0.55);font-size:12px;font-weight:500;text-align:left;margin-bottom:2px;transition:all .15s}
.nav-btn.active{background:rgba(240,192,64,0.15);color:#F0C040}
.s-team{padding:10px 14px 16px;border-top:1px solid rgba(255,255,255,0.08)}
.trow{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.tnm{color:rgba(255,255,255,0.65);font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:11px 22px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #E8ECF4;background:#fff;flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:18px 22px 32px}
.card{background:#fff;border-radius:12px;border:1px solid #E8ECF4;padding:16px 18px;margin-bottom:12px}
.btn{padding:7px 14px;border-radius:7px;border:none;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;display:inline-flex;align-items:center;gap:4px}
.btn-p{background:#0F1C3F;color:#fff;padding:7px 16px}
.btn-g{background:#F0C040;color:#0F1C3F;padding:7px 16px}
.btn-ghost{background:transparent;color:#64748B;border:1px solid #E2E8F0;padding:6px 12px}
.btn-sm{background:#F1F5F9;color:#374151;padding:3px 9px;font-size:11px}
.btn-red{background:#FEE2E2;color:#991B1B;padding:3px 9px;font-size:11px}
.btn-def{background:#F1F5F9;color:#374151}
.lbl{display:block;font-size:11px;color:#64748B;font-weight:500;margin-bottom:3px}
.inp{padding:7px 10px;border-radius:7px;border:1px solid #E2E8F0;font-size:12px;color:#1E293B;outline:none;width:100%}
.inp:focus{border-color:#7C3AED}
.sel{padding:6px 9px;border-radius:7px;border:1px solid #E2E8F0;font-size:12px;color:#334155;cursor:pointer;outline:none;background:#fff}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:8px 10px;text-align:left;background:#F8F9FC;color:#64748B;font-weight:600;font-size:11px;border-bottom:1px solid #E8ECF4;white-space:nowrap}
.tbl td{padding:7px 10px;border-bottom:1px solid #F1F5F9;color:#1E293B;vertical-align:middle}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:600}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
.stat-card{background:#fff;border-radius:12px;border:1px solid #E8ECF4;padding:13px 15px}
.prog-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:12px}
.pbar{height:6px;border-radius:3px;background:#E8ECF4;overflow:hidden;margin-bottom:4px}
.pfill{height:100%;border-radius:3px;transition:width .5s}
.modal-overlay{position:fixed;inset:0;background:rgba(15,28,63,0.65);display:flex;align-items:center;justify-content:center;z-index:400}
.modal-box{background:#fff;border-radius:14px;padding:22px;width:460px;max-width:96vw;box-shadow:0 20px 60px rgba(0,0,0,0.2);max-height:92vh;overflow-y:auto}
.reply-bubble{background:#F0FDF4;border-radius:8px;padding:7px 11px;border-left:3px solid #22C55E;margin-bottom:6px}
#welcome-screen{position:fixed;inset:0;background:#0F1C3F;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300}
#welcome-screen h1{color:#F0C040;font-size:30px;font-weight:800;letter-spacing:-1px;margin-bottom:8px}
#welcome-screen p{color:rgba(255,255,255,0.5);font-size:14px;margin-bottom:36px}
.pill{padding:4px 12px;border-radius:20px;border:1px solid #E2E8F0;font-size:12px;font-weight:600;cursor:pointer;background:#fff;color:#64748B}
.pill.active{background:#0F1C3F;color:#fff;border-color:#0F1C3F}
.chk{width:14px;height:14px;cursor:pointer;accent-color:#7C3AED}
</style>
</head>
<body>

<div id="welcome-screen">
  <h1>⚖️ ATG Audit Tracker</h1>
  <p>Multi-client audit management for CA firms</p>
  <button class="btn btn-g" style="font-size:14px;padding:12px 28px" onclick="showClientModal(null)">+ Create Your First Client</button>
</div>

<div class="app" id="app" style="display:none">
  <div class="sidebar">
    <div class="sidebar-logo"><h1>⚖️ ATG Audit Tracker</h1></div>
    <div class="sidebar-clients">
      <div class="slbl">CLIENTS</div>
      <div id="client-list"></div>
      <button class="add-c-btn" onclick="showClientModal(null)">+ Add Client</button>
    </div>
    <div class="nav-tabs" id="nav-tabs"></div>
    <div class="s-team" id="s-team"></div>
  </div>
  <div class="main">
    <div class="topbar">
      <div>
        <div id="tb-title" style="font-size:15px;font-weight:800;color:#0F1C3F"></div>
        <div id="tb-sub" style="font-size:11px;color:#94A3B8;margin-top:1px"></div>
      </div>
      <div style="display:flex;align-items:center;gap:7px">
        <span id="save-ind" style="font-size:11px;color:#22C55E;font-weight:600;display:none">✓ Saved</span>
        <button class="btn btn-ghost" onclick="exportXLSX()" title="Export full client data to Excel">⬇ Export</button>
        <label class="btn btn-ghost" style="cursor:pointer" title="Restore from Excel backup">⬆ Restore<input type="file" id="restore-file" accept=".xlsx" style="display:none" onchange="restoreXLSX(this)"/></label>
        <button class="btn btn-ghost" onclick="showClientModal(activeClientId)">⚙ Edit Client</button>
      </div>
    </div>
    <div class="content" id="main-content"></div>
  </div>
</div>

<!-- CLIENT MODAL -->
<div class="modal-overlay" id="client-modal" style="display:none">
  <div class="modal-box">
    <div style="font-weight:800;font-size:16px;color:#0F1C3F;margin-bottom:16px" id="modal-title">Add New Client</div>
    <input type="hidden" id="m-id"/>
    <label class="lbl">Company Name *</label>
    <input class="inp" id="m-name" placeholder="e.g. ABC Healthcare Pvt. Ltd." style="margin-bottom:10px"/>
    <label class="lbl">Financial Year</label>
    <input class="inp" id="m-fy" placeholder="2024-25" style="margin-bottom:10px"/>
    <label class="lbl">Company Manager (client-side contact)</label>
    <input class="inp" id="m-manager" placeholder="e.g. Rajesh Sharma – CFO" style="margin-bottom:12px"/>
    <label class="lbl">Audit Team Members</label>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <input class="inp" id="m-newmember" placeholder="Enter name, press Add" onkeydown="if(event.key==='Enter')addMember()"/>
      <button class="btn btn-g" onclick="addMember()">Add</button>
    </div>
    <div id="m-tags" style="display:flex;flex-wrap:wrap;gap:5px;min-height:26px;margin-bottom:16px"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-def" onclick="closeClientModal()">Cancel</button>
      <button class="btn btn-p" onclick="saveClient()">Save</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let clients = JSON.parse(localStorage.getItem('atg_c')||'[]');
let allData  = JSON.parse(localStorage.getItem('atg_d')||'{}');
let activeClientId = null;
let activeTab = 'dashboard';
let modalTeam = [];

// Ledger tracker state
let ltTbMode=false, ltTbAccounts=[], ltTbSelected=[], ltTbAuditType='Statutory Audit';
let ltShowAdd=false, ltFilters={type:'All',status:'All',member:'All'};
let ltSelected=[]; // for bulk delete

// Query / Remarks state
let qFilter='All', rmFilter='All';

const AUDIT_TYPES=["Statutory Audit","Tax Audit (3CD)","GST Audit","TP Audit"];
const STATUSES=["Not Started","WIP","Done","Reviewed"];
const MR_STATUSES=["Pending","Approved","Needs Revision"];
const SS={"Not Started":{bg:"#F1F5F9",c:"#64748B"},"WIP":{bg:"#FEF9C3",c:"#854D0E"},"Done":{bg:"#DCFCE7",c:"#166534"},"Reviewed":{bg:"#DBEAFE",c:"#1E3A8A"}};
const MRS={"Pending":{bg:"#F1F5F9",c:"#64748B"},"Approved":{bg:"#DCFCE7",c:"#166534"},"Needs Revision":{bg:"#FEE2E2",c:"#991B1B"}};
const ATC={"Statutory Audit":"#7C3AED","Tax Audit (3CD)":"#0891B2","GST Audit":"#059669","TP Audit":"#D97706"};
const AVC=["#F0C040","#7C3AED","#0891B2","#059669","#D97706","#EF4444"];

function uid(){return Math.random().toString(36).slice(2,9)}
function todayStr(){return new Date().toLocaleDateString('en-IN')}
function esc(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function getCdata(){return allData[activeClientId]||{ledgers:[],remarks:[]}}
function getClient(){return clients.find(c=>c.id===activeClientId)}
function save(){
  localStorage.setItem('atg_c',JSON.stringify(clients));
  localStorage.setItem('atg_d',JSON.stringify(allData));
  const el=document.getElementById('save-ind');
  if(el){el.style.display='inline';clearTimeout(el._t);el._t=setTimeout(()=>el.style.display='none',2200);}
}

// ═══════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════
window.onload=function(){
  if(clients.length){
    document.getElementById('welcome-screen').style.display='none';
    document.getElementById('app').style.display='flex';
    activeClientId=clients[0].id;
    render();
  }
};
function render(){renderSidebar();renderTopbar();renderContent();}

// ═══════════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════════
function renderSidebar(){
  const TABS=[{id:'dashboard',icon:'📊',label:'Dashboard'},{id:'ledgers',icon:'📁',label:'Ledger Tracker'},{id:'remarks',icon:'📝',label:'Remarks'}];
  let cl='';
  clients.forEach(c=>{
    const isA=c.id===activeClientId;
    cl+=`<button class="client-btn ${isA?'active':''}" onclick="switchClient('${c.id}')">
      <span class="cav" style="background:${isA?'#F0C040':'rgba(255,255,255,0.15)'};color:${isA?'#0F1C3F':'rgba(255,255,255,0.5)'}">${c.name[0]}</span>
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(c.name)}</span>
    </button>`;
  });
  document.getElementById('client-list').innerHTML=cl;
  let nt='';
  TABS.forEach(t=>{nt+=`<button class="nav-btn ${activeTab===t.id?'active':''}" onclick="switchTab('${t.id}')">${t.icon} ${t.label}</button>`;});
  document.getElementById('nav-tabs').innerHTML=nt;
  const cl2=getClient();
  if(!cl2){document.getElementById('s-team').innerHTML='';return;}
  const members=[cl2.manager,...(cl2.team||[])].filter(Boolean);
  if(!members.length){document.getElementById('s-team').innerHTML='';return;}
  let th=`<div class="slbl">TEAM</div>`;
  members.forEach((m,i)=>{
    const isMgr=m===cl2.manager;
    th+=`<div class="trow"><span class="cav" style="background:${isMgr?'#F0C040':AVC[i%AVC.length]};color:${isMgr?'#0F1C3F':'#fff'}">${isMgr?'★':m[0]}</span><span class="tnm">${esc(m)}${isMgr?' <span style="color:rgba(255,255,255,0.3);font-size:9px">(Mgr)</span>':''}</span></div>`;
  });
  document.getElementById('s-team').innerHTML=th;
}
function renderTopbar(){
  const cl=getClient(); if(!cl)return;
  document.getElementById('tb-title').textContent=cl.name;
  document.getElementById('tb-sub').textContent=`FY ${cl.fy} · Manager: ${cl.manager||'—'} · ${(cl.team||[]).length} team members`;
}
function switchClient(id){activeClientId=id;activeTab='dashboard';ltTbMode=false;ltSelected=[];render();}
function switchTab(t){activeTab=t;render();}

// ═══════════════════════════════════════════════
// CONTENT ROUTER
// ═══════════════════════════════════════════════
function renderContent(){
  const mc=document.getElementById('main-content');
  if(activeTab==='dashboard') mc.innerHTML=renderDashboard();
  else if(activeTab==='ledgers') mc.innerHTML=renderLedgers();
  else if(activeTab==='remarks') mc.innerHTML=renderRemarks();
}

// ═══════════════════════════════════════════════
// CLIENT MODAL
// ═══════════════════════════════════════════════
function showClientModal(id){
  modalTeam=[];
  if(id){
    const c=clients.find(x=>x.id===id);
    document.getElementById('modal-title').textContent='Edit Client';
    document.getElementById('m-id').value=c.id;
    document.getElementById('m-name').value=c.name;
    document.getElementById('m-fy').value=c.fy;
    document.getElementById('m-manager').value=c.manager||'';
    modalTeam=[...(c.team||[])];
  } else {
    document.getElementById('modal-title').textContent='Add New Client';
    document.getElementById('m-id').value='';
    document.getElementById('m-name').value='';
    document.getElementById('m-fy').value='2024-25';
    document.getElementById('m-manager').value='';
    modalTeam=[];
  }
  renderMTags();
  document.getElementById('client-modal').style.display='flex';
}
function renderMTags(){
  const c=document.getElementById('m-tags');
  if(!modalTeam.length){c.innerHTML='<span style="font-size:11px;color:#94A3B8">No members yet.</span>';return;}
  c.innerHTML=modalTeam.map(m=>`<span style="background:#EEF2FF;color:#4338CA;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;display:inline-flex;align-items:center;gap:4px">${esc(m)}<button onclick="removeMember('${esc(m)}')" style="background:none;border:none;cursor:pointer;color:#A5B4FC;font-weight:800;font-size:12px;padding:0;line-height:1">×</button></span>`).join('');
}
function addMember(){const v=document.getElementById('m-newmember').value.trim();if(v&&!modalTeam.includes(v)){modalTeam.push(v);document.getElementById('m-newmember').value='';renderMTags();}}
function removeMember(m){modalTeam=modalTeam.filter(t=>t!==m);renderMTags();}
function closeClientModal(){document.getElementById('client-modal').style.display='none';}
function saveClient(){
  const name=document.getElementById('m-name').value.trim();
  if(!name)return alert('Company name is required.');
  const id=document.getElementById('m-id').value||uid();
  const fy=document.getElementById('m-fy').value.trim()||'2024-25';
  const manager=document.getElementById('m-manager').value.trim();
  if(clients.find(c=>c.id===id)) clients=clients.map(c=>c.id===id?{...c,name,fy,manager,team:modalTeam}:c);
  else clients.push({id,name,fy,manager,team:modalTeam});
  save();
  if(!allData[id]) allData[id]={ledgers:[],remarks:[]};
  activeClientId=id;
  document.getElementById('welcome-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  closeClientModal();render();
}

// ═══════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════
function renderDashboard(){
  const cl=getClient();
  const {ledgers=[],remarks=[]}=getCdata();
  const allMembers=[cl.manager,...(cl.team||[])].filter(Boolean);
  const totalDone=ledgers.filter(l=>l.status==='Done'||l.status==='Reviewed').length;
  const totalWIP=ledgers.filter(l=>l.status==='WIP').length;
  const openR=remarks.filter(r=>r.resolution==='Not Resolved').length;
  const overdue=ledgers.filter(l=>l.dueDate&&l.status!=='Done'&&l.status!=='Reviewed'&&new Date(l.dueDate)<new Date()).length;

  let html=`<div class="stats-grid">
    ${[{l:'Total Ledgers',v:ledgers.length,c:'#7C3AED'},{l:'Completed',v:totalDone,c:'#22C55E'},{l:'In Progress',v:totalWIP,c:'#EAB308'},{l:'Pending Remarks',v:openR,c:'#D97706'}].map((s,i)=>i<4?`
    <div class="stat-card" style="border-left:4px solid ${s.c}"><div style="font-size:22px;font-weight:800;color:#0F1C3F;line-height:1">${s.v}</div><div style="font-size:11px;color:#64748B;margin-top:3px;font-weight:500">${s.l}</div></div>`:'').join('')}
  </div>
  <div style="background:#fff;border-radius:12px;border:1px solid #E8ECF4;padding:13px 16px;margin-bottom:12px;display:flex;gap:20px;flex-wrap:wrap">
    ${[{l:'Total Ledgers',v:ledgers.length,c:'#7C3AED'},{l:'Completed',v:totalDone,c:'#22C55E'},{l:'In Progress',v:totalWIP,c:'#EAB308'},{l:'Pending Remarks',v:openR,c:'#D97706'}].map(s=>`
    <div style="text-align:center;flex:1;min-width:80px"><div style="font-size:20px;font-weight:800;color:${s.c}">${s.v}</div><div style="font-size:10px;color:#64748B;font-weight:500">${s.l}</div></div>`).join('')}
  </div>`;

  // Remove duplicate stats grid - replace with clean version
  html=`${overdue>0?`<div style="background:#FEF2F2;border:1px solid #FECACA;border-radius:9px;padding:8px 14px;margin-bottom:12px;font-size:12px;color:#991B1B;font-weight:600">⚠️ ${overdue} ledger${overdue>1?'s are':' is'} past due date.</div>`:''}`;

  // Stat cards
  html+=`<div class="stats-grid" style="grid-template-columns:repeat(5,1fr)">
    ${[{l:'Total Ledgers',v:ledgers.length,c:'#7C3AED'},{l:'Completed',v:totalDone,c:'#22C55E'},{l:'In Progress',v:totalWIP,c:'#EAB308'},{l:'Pending Remarks',v:openR,c:'#D97706'}].map(s=>`
    <div class="stat-card" style="border-left:4px solid ${s.c}"><div style="font-size:20px;font-weight:800;color:#0F1C3F;line-height:1">${s.v}</div><div style="font-size:11px;color:#64748B;margin-top:3px;font-weight:500">${s.l}</div></div>`).join('')}
  </div>`;

  // Progress by type
  html+=`<div class="prog-grid">`;
  AUDIT_TYPES.forEach(at=>{
    const grp=ledgers.filter(l=>l.auditType===at);
    const done=grp.filter(l=>l.status==='Done'||l.status==='Reviewed').length;
    const pct=grp.length?Math.round(done/grp.length*100):0;
    html+=`<div class="card" style="margin-bottom:0"><div style="display:flex;justify-content:space-between;margin-bottom:7px"><span style="font-weight:700;font-size:12px;color:${ATC[at]}">${at}</span><span style="font-size:11px;color:#64748B">${done}/${grp.length}</span></div>
    <div class="pbar"><div class="pfill" style="width:${pct}%;background:${ATC[at]}"></div></div>
    <div style="font-size:11px;color:#94A3B8">${pct}% complete</div></div>`;
  });
  html+=`</div>`;

  // Team workload
  html+=`<div class="card"><div style="font-weight:800;font-size:13px;color:#0F1C3F;margin-bottom:11px">Team Workload</div>`;
  if(!allMembers.length){
    html+=`<div style="color:#94A3B8;font-size:13px;text-align:center;padding:14px">No team added. Click "Edit Client" to add team members.</div>`;
  } else {
    allMembers.forEach((m,i)=>{
      const isMgr=m===cl.manager;
      const assigned=ledgers.filter(l=>l.assignedTo===m);
      const done=assigned.filter(l=>l.status==='Done'||l.status==='Reviewed');
      const pending=assigned.filter(l=>l.status!=='Done'&&l.status!=='Reviewed');
      html+=`<div style="border:1px solid #E8ECF4;border-radius:10px;overflow:hidden;margin-bottom:8px">
        <div style="padding:8px 13px;background:#F8F9FC;display:flex;align-items:center;gap:8px">
          <span class="cav" style="width:26px;height:26px;font-size:10px;background:${AVC[i%AVC.length]};color:${isMgr?'#0F1C3F':'#fff'};flex-shrink:0">${isMgr?'★':m[0]}</span>
          <span style="font-weight:700;font-size:12px;color:#0F1C3F;flex:1">${esc(m)}${isMgr?'<span style="margin-left:6px;font-size:10px;background:#FEF9C3;color:#854D0E;padding:1px 6px;border-radius:10px">Manager</span>':''}</span>

        </div>`;
      if(pending.length){
        html+=`<div style="padding:7px 13px"><div style="font-size:10px;font-weight:700;color:#94A3B8;margin-bottom:4px">PENDING</div><div style="display:flex;flex-wrap:wrap;gap:4px">`;

          const od=l.dueDate&&new Date(l.dueDate)<new Date();
          html+=`<span style="padding:2px 8px;border-radius:20px;font-size:11px;background:${SS[l.status]?.bg};color:${SS[l.status]?.c};font-weight:600">${esc(l.name)}${l.dueDate?` · ${l.dueDate}${od?' ⚠️':''}`:''}</span>`;
        });
        html+=`</div></div>`;
      }
      if(done.length){
        html+=`<div style="padding:5px 13px 8px"><div style="font-size:10px;font-weight:700;color:#94A3B8;margin-bottom:4px">COMPLETED</div><div style="display:flex;flex-wrap:wrap;gap:4px">`;

      html+=`</div>`;
    });
  }
  html+=`</div>`;
  return html;
}

function renderTBSelector(){

        <button class="btn btn-def" onclick="ltTbSelected=[];renderContent()">Clear</button>
        <button class="btn btn-p" onclick="importTB()" ${!ltTbSelected.length?'disabled':''}>Import ${ltTbSelected.length} Ledger${ltTbSelected.length!==1?'s':''}</button>
      </div>
    </div>`;

  if(!newAccounts.length){
    html+=`<div style="text-align:center;padding:24px;color:#94A3B8;font-size:13px">All accounts from this TB already exist as ledgers.</div>`;
  } else {
    html+=`<div style="max-height:400px;overflow-y:auto;display:grid;grid-template-columns:repeat(2,1fr);gap:5px">`;
    newAccounts.forEach(acc=>{
      const sel=ltTbSelected.includes(acc);
      html+=`<label style="display:flex;align-items:center;gap:7px;padding:6px 10px;border-radius:7px;background:${sel?'#EEF2FF':'#F8F9FC'};border:1px solid ${sel?'#A5B4FC':'#E8ECF4'};cursor:pointer;font-size:12px">

  window._tbNewAccounts=newAccounts;
  // Fix select all button
  html=html.replace('newAccounts_','window._tbNewAccounts');
  return html;
}

function handleTBFile(input){
  const file=input.files[0]; if(!file||!window.XLSX)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const wb=XLSX.read(ev.target.result,{type:'binary'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      let hRow=-1,nCol=0;
      for(let r=0;r<Math.min(10,rows.length);r++){
        for(let c=0;c<rows[r].length;c++){
          const v=String(rows[r][c]).toLowerCase();
          if(v.includes('account')||v.includes('ledger')||v.includes('particular')||v.includes('description')){hRow=r;nCol=c;break;}
        }
        if(hRow>=0)break;
      }
      if(hRow<0){hRow=0;nCol=0;}
      const accounts=[];
      for(let r=hRow+1;r<rows.length;r++){
        const v=String(rows[r][nCol]||'').trim();
        if(v&&v.length>1&&!v.toLowerCase().includes('total')&&!accounts.includes(v)) accounts.push(v);
      }
      ltTbAccounts=accounts; ltTbSelected=[]; ltTbMode=true; renderContent();
    }catch(e){alert('Could not parse file.');}
  };
  reader.readAsBinaryString(file);
  input.value='';
}
function toggleTBAcc(acc,checked){
  if(checked){if(!ltTbSelected.includes(acc))ltTbSelected.push(acc);}
  else ltTbSelected=ltTbSelected.filter(x=>x!==acc);
  renderContent();
}
function importTB(){
  const {ledgers=[]}=getCdata();
  const existingNames=new Set(ledgers.map(l=>l.name.trim().toLowerCase()));
  const newOnes=ltTbSelected.filter(n=>!existingNames.has(n.trim().toLowerCase()));
  const skipped=ltTbSelected.length-newOnes.length;
  if(!newOnes.length){alert('All selected accounts already exist. No duplicates added.');ltTbMode=false;ltTbAccounts=[];ltTbSelected=[];renderContent();return;}
  const toAdd=newOnes.map((name,i)=>({id:uid(),ref:`L${String(ledgers.length+i+1).padStart(3,'0')}`,auditType:ltTbAuditType,name,assignedTo:'',status:'Not Started',mrStatus:'Pending',dueDate:'',remarks:''}));
  const cd=getCdata();
  allData[activeClientId]={...cd,ledgers:[...ledgers,...toAdd]};
  save();ltTbMode=false;ltTbAccounts=[];ltTbSelected=[];
  if(skipped>0)alert(`✅ ${newOnes.length} ledger(s) added. ${skipped} duplicate(s) were skipped.`);
  renderContent();
}
function addLedgerManual(){
  const name=document.getElementById('add-nm').value.trim();
  const type=document.getElementById('add-at').value;
  if(!name)return;
  const cd=getCdata();
  const dup=cd.ledgers.find(l=>l.name.trim().toLowerCase()===name.toLowerCase()&&l.auditType===type);
  if(dup){alert('A ledger with this name already exists for this audit type.');return;}
  const l={id:uid(),ref:`L${String(cd.ledgers.length+1).padStart(3,'0')}`,auditType:type,name,assignedTo:'',status:'Not Started',mrStatus:'Pending',dueDate:'',remarks:''};
  allData[activeClientId]={...cd,ledgers:[...cd.ledgers,l]};
  save();ltShowAdd=false;renderContent();
}
function updateL(id,field,val){
  const cd=getCdata();
  allData[activeClientId]={...cd,ledgers:cd.ledgers.map(l=>l.id===id?{...l,[field]:val}:l)};
  save();
}
function deleteL(id){
  if(!confirm('Delete this ledger?'))return;
  const cd=getCdata();
  allData[activeClientId]={...cd,ledgers:cd.ledgers.filter(l=>l.id!==id)};
  ltSelected=ltSelected.filter(s=>s!==id);
  save();renderContent();
}
function toggleLedgerSel(id,checked){
  if(checked){if(!ltSelected.includes(id))ltSelected.push(id);}
  else ltSelected=ltSelected.filter(s=>s!==id);
  renderContent();
}
function toggleSelectAll(checked,ids){
  if(checked) ids.forEach(id=>{if(!ltSelected.includes(id))ltSelected.push(id);});
  else ltSelected=ltSelected.filter(s=>!ids.includes(s));
  renderContent();
}
function deleteSelected(){
  if(!ltSelected.length)return;
  if(!confirm(`Delete ${ltSelected.length} selected ledger(s)?`))return;
  const cd=getCdata();
  allData[activeClientId]={...cd,ledgers:cd.ledgers.filter(l=>!ltSelected.includes(l.id))};
  ltSelected=[];
  save();renderContent();
}

function toggleResolution(id){
  const cd=getCdata();
  allData[activeClientId]={...cd,remarks:(cd.remarks||[]).map(r=>r.id===id?{...r,resolution:r.resolution==='Resolved'?'Not Resolved':'Resolved'}:r)};
  save();renderContent();
}
function saveRemarkResponse(id){
  const val=(document.getElementById('rr-'+id).value||'').trim();
  const cd=getCdata();
  allData[activeClientId]={...cd,remarks:(cd.remarks||[]).map(r=>r.id===id?{...r,response:val}:r)};
  save();renderContent();
}
function deleteRemark(id){
  const cd=getCdata();
  allData[activeClientId]={...cd,remarks:(cd.remarks||[]).filter(r=>r.id!==id)};
  save();renderContent();
}

// ═══════════════════════════════════════════════
// EXPORT / RESTORE (EXCEL)
// ═══════════════════════════════════════════════
function exportXLSX(){
  const cl=getClient(); if(!cl||!window.XLSX)return;
  const cd=getCdata();
  const wb=XLSX.utils.book_new();

  // Sheet 1: Client Info
  const info=[
    ['ATG Audit Tracker – Client Export'],
    [],
    ['Company Name', cl.name],
    ['Financial Year', cl.fy],
    ['Manager', cl.manager||''],
    ['Team Members', (cl.team||[]).join(', ')],
    ['Exported On', new Date().toLocaleString('en-IN')],
  ];
  const wsI=XLSX.utils.aoa_to_sheet(info); wsI['!cols']=[{wch:20},{wch:40}];
  XLSX.utils.book_append_sheet(wb,wsI,'Client Info');

  // Sheet 2: Ledgers
  const lRows=[['Ref','Audit Type','Ledger / Area','Assigned To','Status','Manager Review','Due Date','Remarks']];
  (cd.ledgers||[]).forEach(l=>lRows.push([l.ref,l.auditType,l.name,l.assignedTo||'',l.status,l.mrStatus||'Pending',l.dueDate||'',l.remarks||'']));
  const wsL=XLSX.utils.aoa_to_sheet(lRows); wsL['!cols']=[{wch:8},{wch:20},{wch:30},{wch:18},{wch:14},{wch:16},{wch:12},{wch:30}];
  XLSX.utils.book_append_sheet(wb,wsL,'Ledgers');

  // Sheet 3: Remarks
  const rRows=[['Date','Ledger Ref','Remark','Raised By','Category','Priority','Resolution','Response']];
  (cd.remarks||[]).forEach(r=>rRows.push([r.date,r.ledgerRef||'',r.text,r.raisedBy,r.category,r.priority,r.resolution,r.response||'']));
  const wsR=XLSX.utils.aoa_to_sheet(rRows); wsR['!cols']=[{wch:12},{wch:10},{wch:45},{wch:16},{wch:18},{wch:8},{wch:14},{wch:40}];
  XLSX.utils.book_append_sheet(wb,wsR,'Remarks');

  // Hidden meta sheet for restore
  const meta=[[JSON.stringify({client:cl,data:cd})]];
  const wsM=XLSX.utils.aoa_to_sheet(meta);
  XLSX.utils.book_append_sheet(wb,wsM,'_meta');

  const fname=`ATG_${cl.name.replace(/\s+/g,'_')}_FY${cl.fy.replace(/-/g,'')}_${new Date().toISOString().slice(0,10)}.xlsx`;
  XLSX.writeFile(wb,fname);
}

function restoreXLSX(input){
  const file=input.files[0]; if(!file||!window.XLSX)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const wb=XLSX.read(ev.target.result,{type:'binary'});
      const metaSheet=wb.Sheets['_meta'];
      if(!metaSheet)throw new Error('Invalid backup file – no meta sheet found.');
      const rows=XLSX.utils.sheet_to_json(metaSheet,{header:1});
      const payload=JSON.parse(rows[0][0]);
      const cl=payload.client, cd=payload.data;
      if(!cl||!cd)throw new Error('Invalid data in backup.');
      const existing=clients.find(c=>c.id===cl.id);
      if(existing){
        if(!confirm(`Client "${cl.name}" already exists. Overwrite with backup?`))return;
        clients=clients.map(c=>c.id===cl.id?cl:c);
      } else {
        clients.push(cl);
      }
      allData[cl.id]=cd;
      save();
      activeClientId=cl.id; activeTab='dashboard';
      document.getElementById('welcome-screen').style.display='none';
      document.getElementById('app').style.display='flex';
      render();
      alert(`✅ "${cl.name}" restored successfully!`);
    }catch(e){alert('Restore failed: '+e.message);}
  };
  reader.readAsBinaryString(file);
  input.value='';
}
